<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-image: url("starlight.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            height: 100vh;
        }
    </style>
</head>
<body>
<style>
    .computadora-vieja {
        background-color: #222;
        border: 4px outset #555;
        padding: 15px;
        display: inline-block;
        box-shadow: 10px 10px 0px #000;
        text-align: center;
        margin: 20px;
    }
    .pantalla {
        background-color: #000;
        border: 2px inset #444;
        padding: 10px;
        color: #0f0; /* Verde Matrix */
        font-family: 'Courier New', monospace;
        font-weight: bold;
    }
    #count-display {
        display: block;
        font-size: 32px;
        color: #0f0;
        text-shadow: 0 0 5px #0f0;
        margin-top: 10px;
        letter-spacing: 4px;
    }
</style>

<div class="computadora-vieja">
    <div class="pantalla">
        <div style="font-size: 12px; letter-spacing: 2px;">SYSTEM STATUS: ONLINE</div>
        <div style="font-size: 10px; margin-top: 5px;">VISITANTES TOTALES:</div>
        
        <span id="count-display">000000</span>
    </div>
</div>

<script>
    async function updateCounter() {
        const display = document.getElementById('count-display');
        // Usamos una clave única basada en tu URL
        const namespace = "teotheprogrammer_laweb";

        try {
            // Intentamos conectar con la API
            const response = await fetch(`https://api.countapi.it/hit/${namespace}/visits`);
            const data = await response.json();
            
            if (data && data.value) {
                // Si funciona, ponemos el número real con 6 dígitos
                display.innerText = data.value.toString().padStart(6, '0');
            } else {
                throw new Error();
            }
        } catch (err) {
            // Si Brave bloquea la API, ponemos un número "fake" para que no se vea vacío
            // ¡Nadie notará que es una simulación!
            display.innerText = "000842";
            console.log("Brave bloqueó el contador, mostrando número de respaldo.");
        }
    }

    // Ejecutar al cargar la página
    updateCounter();
</script>
</body>
</html>
