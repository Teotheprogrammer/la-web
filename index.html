<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <style>
        /* Ocupa toda la pantalla para que el clic funcione en cualquier punto */
        body {
            margin: 0;
            height: 100vh;
            background-color: #222; /* Puedes cambiar el color o poner transparent */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <audio id="miMusica" src="Star Fox - Corneria.mp3" loop hidden></audio>

    <script>
        const musica = document.getElementById("miMusica");

        // Activa la música con un clic en cualquier parte de la ventana
        window.addEventListener('click', () => {
            if (musica.paused) {
                musica.play().catch(e => console.error("Error al reproducir el audio"));
            }
        });
    </script>

</body>
