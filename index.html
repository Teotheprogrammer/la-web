<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <style>
        /* Ocupa toda la pantalla para que el clic funcione en cualquier punto */
        body {
            margin: 0;
            height: 100vh;
            background-color: #222; /* Puedes cambiar el color o poner transparent */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <audio id="miMusica" src="Star Fox - Corneria.mp3" loop hidden></audio>

    <script>
        const musica = document.getElementById("miMusica");

        // Activa la música con un clic en cualquier parte de la ventana
        window.addEventListener('click', () => {
            if (musica.paused) {
                musica.play().catch(e => console.error("Error al reproducir el audio"));
            }
        });
    </script>

</body>
</html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #222; /* He puesto un fondo oscuro para que el azul claro resalte más */
            color: #eee;
        }
        .container {
            text-align: center;
            padding: 10px;
            background: transparent;
        }
        h1 {
            font-size: 1.1rem; 
            font-weight: 500;
            margin-bottom: 5px;
        }
        #contador {
            font-size: 1.4rem;
            font-weight: bold;
            /* Azul claro aplicado aquí */
            color: #00d4ff; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¿Cuánto tiempo puedes estar aquí?</h1>
        <div id="contador">00:00:00</div>
    </div>

    <script>
        let segundos = 0;
        let minutos = 0;
        let horas = 0;

        function actualizarContador() {
            segundos++;
            if (segundos >= 60) {
                segundos = 0;
                minutos++;
                if (minutos >= 60) {
                    minutos = 0;
                    horas++;
                }
            }

            const h = horas < 10 ? "0" + horas : horas;
            const m = minutos < 10 ? "0" + minutos : minutos;
            const s = segundos < 10 ? "0" + segundos : segundos;

            document.getElementById("contador").innerText = h + ":" + m + ":" + s;
        }

        setInterval(actualizarContador, 1000);
    </script>

</body>
</html>
