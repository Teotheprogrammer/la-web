<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Comic Sans MS', 'Comic Sans', cursive; text-align: center; margin-top: 50px; }
        #tiempo { font-size: 3rem; color: blue; }
        #record { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tiempo">00:00:00</div>
    <p id="record">Mejor Récord: --</p> 

    <button onclick="detenerYGuardar()">Detener y Guardar Récord</button> <img src="./cd.gif">
    <button onclick="reiniciarPagina()">Reiniciar Página</button> <img src="./windows.gif">

    <script>
        let segundosTotales = 0;
        const displayTiempo = document.getElementById('tiempo');
        const displayRecord = document.getElementById('record');

        // Función para convertir segundos a formato 00:00:00
        function formatearTiempo(segundos) {
            const h = Math.floor(segundos / 3600).toString().padStart(2, '0');
            const m = Math.floor((segundos % 3600) / 60).toString().padStart(2, '0');
            const s = (segundos % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // 1. Iniciar el cronómetro
        const intervalo = setInterval(() => {
            segundosTotales++;
            displayTiempo.innerText = formatearTiempo(segundosTotales);
        }, 1000);

        // 2. Al cargar la página
        window.onload = function() {
            const guardado = localStorage.getItem('miRecord');
            if (guardado) {
                displayRecord.innerText = "Mejor Récord: " + formatearTiempo(parseInt(guardado));
            }
        };

        // 3. Detener y Guardar
        function detenerYGuardar() {
            clearInterval(intervalo);
            let recordActual = localStorage.getItem('miRecord');

            // Comparamos los segundos totales para ver cuál es más bajo
            if (recordActual === null || segundosTotales < parseInt(recordActual)) {
                localStorage.setItem('miRecord', segundosTotales);
                displayRecord.innerText = "Mejor Récord: " + formatearTiempo(segundosTotales);
                
            } else {
                
            }
        }

        // 4. Reiniciar
        function reiniciarPagina() {
            location.reload();
        }
    </script>

</body>
</html>
