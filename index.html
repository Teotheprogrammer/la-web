<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        #tiempo { font-size: 3rem; color: blue; }
        #record { color: green; font-weight: bold; }
    </style>
</head>
<body>

    
    <div id="tiempo">0</div>
    <p id="record">Mejor Récord: --</p>

    <button onclick="detenerYGuardar()">Detener y Guardar Récord</button>
    <button onclick="reiniciarPagina()">Reiniciar Página</button>

    <script>
        let segundos = 0;
        const displayTiempo = document.getElementById('tiempo');
        const displayRecord = document.getElementById('record');

        // 1. Iniciar el cronómetro automáticamente
        const intervalo = setInterval(() => {
            segundos++;
            displayTiempo.innerText = segundos;
        }, 1000);

        // 2. Al cargar la página, mostrar el récord guardado en la memoria del navegador
        window.onload = function() {
            const guardado = localStorage.getItem('miRecord');
            if (guardado) {
                displayRecord.innerText = "Mejor Récord: " + guardado + " segundos";
            }
        };

        // 3. Función para guardar si el tiempo actual es mejor (más bajo)
        function detenerYGuardar() {
            clearInterval(intervalo);
            let recordActual = localStorage.getItem('miRecord');

            // Si no hay récord o el tiempo actual es menor al récord viejo...
            if (recordActual === null || segundos < parseInt(recordActual)) {
                localStorage.setItem('miRecord', segundos);
                displayRecord.innerText = "Mejor Récord: " + segundos + " segundos";
                alert("¡Nuevo récord personal!");
            } else {
                alert("Buen intento, pero no superaste el récord.");
            }
        }

        // 4. Comando para reiniciar la página
        function reiniciarPagina() {
            location.reload();
        }
    </script>

</body>
</html>

<body>

    <audio id="miMusica" src="Star Fox - Corneria.mp3" loop hidden></audio>

    <script>
        const musica = document.getElementById("miMusica");

        // Activa la música con un clic en cualquier parte de la ventana
        window.addEventListener('click', () => {
            if (musica.paused) {
                musica.play().catch(e => console.error("Error al reproducir el audio"));
            }
        });
    </script>
